name: Build iOS IPA (unsigned)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build unsigned IPA
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Build Next.js static export
        run: npm run build:mobile
        env:
          NEXT_EXPORT: 'true'

      - name: Add iOS platform (if missing)
        # The ios/ folder is not committed to the repo. Generate it on CI.
        # `cap add ios` scaffolds ios/App and runs pod install internally.
        run: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi

      - name: Sync Capacitor (copies web build + plugin sources)
        # Capacitor 8 uses Swift Package Manager by default — no Podfile is
        # generated and no `pod install` step is needed.
        run: npx cap sync ios

      - name: Build unsigned IPA
        run: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -skipPackagePluginValidation \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            archive

          mkdir -p $RUNNER_TEMP/Payload
          cp -r "$RUNNER_TEMP/App.xcarchive/Products/Applications/App.app" \
            "$RUNNER_TEMP/Payload/App.app"
          cd $RUNNER_TEMP
          zip -r MicroLearn.ipa Payload/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: MicroLearn-unsigned
          path: ${{ runner.temp }}/MicroLearn.ipa
          retention-days: 30
